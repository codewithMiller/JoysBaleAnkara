<!doctype html>
<html lang="en">
 <head><script src="/_sdk/telemetry_sdk.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&amp;family=DM+Sans:wght@400;500;600&amp;display=swap" rel="stylesheet">
  <style>
    :root { --gold: #C9A84C; --black: #0A0A0A; --cream: #FAF7F0; }
    body { font-family: 'DM Sans', sans-serif; background: #0A0A0A; color: #FAF7F0; margin: 0; overflow: hidden; }
    h1,h2,h3 { font-family: 'Playfair Display', serif; }

    .glitch {
      position: relative;
      animation: flicker 3s infinite;
    }
    .glitch::before, .glitch::after {
      content: '404';
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }
    .glitch::before {
      color: #C9A84C;
      animation: glitch-shift 2s infinite;
      clip-path: inset(0 0 60% 0);
    }
    .glitch::after {
      color: #E8D48B;
      animation: glitch-shift 2s infinite reverse;
      clip-path: inset(60% 0 0 0);
    }
    @keyframes glitch-shift {
      0%, 90%, 100% { transform: translate(0); }
      92% { transform: translate(-4px, 2px); }
      94% { transform: translate(4px, -2px); }
      96% { transform: translate(-2px, -1px); }
      98% { transform: translate(2px, 1px); }
    }
    @keyframes flicker {
      0%, 95%, 100% { opacity: 1; }
      96% { opacity: 0.8; }
      97% { opacity: 1; }
      98% { opacity: 0.6; }
      99% { opacity: 1; }
    }

    .particle {
      position: absolute;
      width: 4px; height: 4px;
      background: #C9A84C;
      border-radius: 50%;
      opacity: 0;
      animation: float-up 4s infinite;
    }
    @keyframes float-up {
      0% { opacity: 0; transform: translateY(0) scale(0); }
      20% { opacity: 0.8; transform: translateY(-20vh) scale(1); }
      100% { opacity: 0; transform: translateY(-80vh) scale(0.5); }
    }

    .orb {
      width: 120px; height: 120px;
      background: radial-gradient(circle, rgba(201,168,76,0.3) 0%, transparent 70%);
      border-radius: 50%;
      position: fixed;
      pointer-events: none;
      transition: transform 0.15s ease-out;
      filter: blur(2px);
    }

    .btn-gold {
      background: linear-gradient(135deg, #C9A84C, #E8D48B, #C9A84C);
      background-size: 200% 200%;
      animation: shimmer 3s ease infinite;
      transition: all 0.3s;
    }
    .btn-gold:hover { transform: scale(1.05); box-shadow: 0 8px 30px rgba(201,168,76,0.4); }
    @keyframes shimmer { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }

    .line-decoration {
      width: 60px; height: 2px;
      background: linear-gradient(90deg, transparent, #C9A84C, transparent);
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js" type="text/javascript"></script>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
  <script src="/_sdk/resizing_sdk.js" type="text/javascript"></script>
 </head>
 <body data-template-id="__page-root" class="w-full flex items-center justify-center" style="min-height:calc(100 * min(var(--vh,1vh),1vh))">
  <div class="orb" id="orb"></div>
  <div id="particles" class="fixed inset-0 pointer-events-none"></div>
  <main class="relative z-10 text-center px-6">
   <h1 data-template-id="error-code" class="canva-text glitch text-[8rem] md:text-[12rem] font-black leading-none select-none" style="color:#C9A84C;"></h1>
   <div class="line-decoration mx-auto my-6"></div>
   <p data-template-id="error-message" class="canva-text text-xl md:text-2xl mb-2 tracking-wide"></p>
   <p data-template-id="error-submessage" class="canva-text text-sm md:text-base opacity-60 mb-10"></p><a data-template-id="back-button" class="canva-button btn-gold inline-block px-8 py-3 rounded-full text-[#0A0A0A] font-semibold tracking-wide cursor-pointer"></a>
  </main>
  <script src="/_sdk/editing_sdk.js"></script>
  <script>
    // Particles
    const particleContainer = document.getElementById('particles');
    for (let i = 0; i < 30; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + '%';
      p.style.bottom = '0';
      p.style.animationDelay = Math.random() * 4 + 's';
      p.style.animationDuration = (3 + Math.random() * 3) + 's';
      p.style.width = p.style.height = (2 + Math.random() * 4) + 'px';
      particleContainer.appendChild(p);
    }

    // Orb follows cursor
    const orb = document.getElementById('orb');
    document.addEventListener('mousemove', (e) => {
      orb.style.transform = `translate(${e.clientX - 60}px, ${e.clientY - 60}px)`;
    });
  </script>
